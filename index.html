<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/vue@3"></script>
</head>
<body>

<div id="app">
  <h3>札幌駅 到着希望</h3>
  <input v-model="input" placeholder="08:30">
  <button @click="calc">検索</button>

  <ul>
    <li v-for="t in result">{{t}}</li>
  </ul>
</div>

<script>
const { createApp } = Vue;

createApp({
  data(){
    return {
      input:"",
      result:[],
      busTimes:[
"07:58",
"08:48",
"10:21",
"11:26",
"13:06",
"15:06",
"16:06",
"17:03",
"17:46",
"18:10",
"19:10",
"19:30",
"20:01"
      ]
    }
  },
  methods:{
    toMin(t){
      const [h,m]=t.split(":").map(Number);
      return h*60+m;
    },
    toStr(min){
      const h=Math.floor(min/60);
      const m=min%60;
      return `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}`;
    },
    calc(){
      const toEbetsu = 25;
      const toSapporo = 30;

      const arrival = this.toMin(this.input);
      const ebetsu = arrival - toSapporo;
      const departLimit = ebetsu - toEbetsu;

      this.result = this.busTimes
        .map(this.toMin)
        .filter(t=>t<=departLimit)
        .sort((a,b)=>b-a)
        .slice(0,3)
        .map(this.toStr);
    }
  }
}).mount("#app");
</script>

</body>
</html>
